<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Journey ❤️</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body id="page2">
    <div id="transition-overlay" class="active"></div>

    <div class="custom-cursor"></div>
    <div class="custom-cursor-follower"></div>

    <canvas id="particle-canvas"></canvas>
    
    <div class="room-atmosphere">
        <div class="warm-glow left"></div>
        <div class="warm-glow right"></div>
    </div>

    <main class="room-container">
        <p class="instruction-text fade-in-up">Choose whichever your heart reaches for first...</p>
        
        <div class="envelopes-wrapper fade-in-up delay-1">
            <!-- Envelope 1 -->
            <div class="envelope-container interactive" id="env-us">
                <div class="envelope cream">
                    <div class="env-flap"></div>
                    <div class="env-body"></div>
                    <div class="wax-seal heart-seal">❤️</div>
                    <h2 class="env-title">Us ❤️</h2>
                </div>
            </div>

            <!-- Envelope 2 -->
            <div class="envelope-container interactive" id="env-letter">
                <div class="envelope pink">
                    <div class="env-flap"></div>
                    <div class="env-body"></div>
                    <div class="wax-seal gold-seal">💋</div>
                    <h2 class="env-title">Mwaaahhhhh 💋</h2>
                </div>
            </div>
        </div>

        <button id="btn-continue" class="premium-btn continue-btn interactive hidden">
            Continue Our Journey ❤️
            <div class="btn-glow"></div>
        </button>
    </main>

    <!-- Polaroid Modal -->
    <div class="modal glass-modal" id="polaroid-modal">
        <button class="close-modal interactive">✕</button>
        <div class="polaroid-gallery">
            <button class="nav-btn prev-btn interactive">‹</button>
            <div class="polaroid-card">
                <div class="polaroid-image-container">
                    <img id="polaroid-img" src="photo1.jpg" alt="Us">
                </div>
                <div class="polaroid-caption" id="polaroid-caption">Loading memories...</div>
            </div>
            <button class="nav-btn next-btn interactive">›</button>
        </div>
        <div class="gallery-progress" id="gallery-progress">1 / 10</div>
        <p class="gallery-end-text" id="gallery-end-text">Every picture reminds me how lucky I feel.</p>
    </div>

    <!-- Letter Modal -->
    <div class="modal glass-modal" id="letter-modal">
        <button class="close-modal interactive">✕</button>
        <div class="letter-paper">
            <div id="typewriter-content"></div>
            <span class="typewriter-cursor">|</span>
            <div class="letter-signature fade-in hidden">With all my love ❤️</div>
        </div>
    </div>

    <!-- Global Music Player -->
    <div class="music-player interactive" id="music-player">
        <audio id="bg-music" loop preload="auto">
            <source src="music/love.mp3" type="audio/mpeg">
        </audio>
        <div class="player-controls">
            <button id="play-pause-btn" class="ctrl-btn">
                <svg id="icon-play" viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                <svg id="icon-pause" viewBox="0 0 24 24" width="24" height="24" fill="currentColor" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <div class="volume-container">
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
